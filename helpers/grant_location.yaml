appId: any
---
# ============================================================
# GRANT LOCATION
# Taps the home weather widget and walks through every dialog
# that can appear before the location permission is actually
# granted. Each step is wrapped in `runFlow when: visible:`,
# so any dialog already past (e.g. permission previously
# granted at the OS level) is silently skipped — re-running on
# a device with the permission still set is a no-op past the
# initial tap.
#
# Usage from a flow under flows/home/:
#   - runFlow: ../../helpers/grant_location.yaml
# ============================================================

# Tap on weather widget button
- tapOn:
    id: "home_weather_button"

# Handle "Share Location" interstitial screen (button at bottom)
- runFlow:
    when:
      visible:
        id: "location_interstitial_cta_btn"
    commands:
      - tapOn:
          id: "location_interstitial_cta_btn"

# Handle location permission popup (foreground-only)
- runFlow:
    when:
      visible:
        id: "com.android.permissioncontroller:id/permission_allow_foreground_only_button"
    commands:
      - tapOn:
          id: "com.android.permissioncontroller:id/permission_allow_foreground_only_button"

- runFlow:
    when:
      visible:
        text: "No thanks"
    commands:
      - tapOn: "No thanks"
