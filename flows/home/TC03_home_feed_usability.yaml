appId: any
name: "TC03 - Home Feed Usability"
tags:
  - home
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# First, set up location to get Kenya content cards (same as TC01)
# Tap on weather widget button
- tapOn:
    id: "home_weather_button"

# Handle "Share Location" interstitial screen (button at bottom)
- runFlow:
    when:
      visible:
        text: "Get local farm advice"
    commands:
      - tapOn:
          text: "Share Location"
          index: 1

# Handle location permission popup - "While using the app"
- runFlow:
    when:
      visible:
        text: "While using the app"
    commands:
      - tapOn: "While using the app"

# Alternative: Handle by permission button ID
- runFlow:
    when:
      visible:
        id: "com.android.permissioncontroller:id/permission_allow_foreground_only_button"
    commands:
      - tapOn:
          id: "com.android.permissioncontroller:id/permission_allow_foreground_only_button"

- runFlow:
    when:
      visible:
        text: "No thanks"
    commands:
      - tapOn: "No thanks"

# Scroll down to find "Related questions" section
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible: "Related questions"
# Go back to home screen
- back

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 10000
- tapOn:
    text: "Learn More"
    index: 0
- extendedWaitUntil:
    visible:
      id: "chat_read_full_advice_button"
    timeout: 30000
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_read_full_advice_button"
    direction: DOWN
- tapOn:
    id: "chat_read_full_advice_button"
- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
- assertVisible: "Related questions"
