appId: any
name: "TC03 - Home Feed Usability"
tags:
  - home
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Set up location so the feed personalizes
- runFlow: ../../helpers/grant_location.yaml

# Scroll the result chat to find the related-questions section
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"

# Back to home
- back
- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 10000

# Open the first feed card via its "Learn More" CTA
- extendedWaitUntil:
    visible:
      id: "content_card_start_chat_btn"
    timeout: 15000
- tapOn:
    id: "content_card_start_chat_btn"
    index: 0

# The card opens chat_screen with the corresponding question pre-asked
- extendedWaitUntil:
    visible:
      id: "chat_screen"
    timeout: 30000
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"
