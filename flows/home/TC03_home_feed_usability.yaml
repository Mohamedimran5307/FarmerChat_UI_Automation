appId: any
name: "TC03 - Home Feed Usability"
# priority: P1
# description: Confirms that users can smoothly scroll through the home feed and access all content cards without issues
tags:
  - home
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Set up location so the feed personalizes
- runFlow: ../../helpers/grant_location.yaml

# Scroll the result chat to find the related-questions section
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"

# Back to home
- back
- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 10000

# Open the first feed card via its "Learn More" CTA.
# centerElement guards against the button rendering on top of the system
# nav bar — Maestro's tap lands on the OS Home key otherwise (see commit
# 3502503 for the prior occurrence).
- scrollUntilVisible:
    centerElement: true
    element:
      id: "content_card_start_chat_btn"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "content_card_start_chat_btn"
    index: 0

# scrollUntilVisible below waits up to 90s for the answer to finish — no
# extra extendedWaitUntil on chat_screen needed (it renders instantly).
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"
