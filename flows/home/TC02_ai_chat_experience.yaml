appId: any
name: "TC02 - AI Chat Experience"
tags:
  - home
  - chat
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Open the type input bar
- tapOn:
    id: "primary_input_type_btn"
- extendedWaitUntil:
    visible:
      id: "chat_text_input"
    timeout: 5000
- tapOn:
    id: "chat_text_input"
- inputText: "How to grow tomatoes"
- extendedWaitUntil:
    visible:
      id: "chat_send_btn"
    timeout: 5000
- tapOn:
    id: "chat_send_btn"

# scrollUntilVisible waits up to 90s for chat_suggested_questions, which
# only appears once the answer is fully streamed — that's the implicit
# "wait for AI response". An extra extendedWaitUntil on chat_screen is a
# no-op because the wrapper is visible the instant we land here.
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"

# Tap an "Ask" follow-up suggestion. ^Ask$ is anchored because Maestro's
# text: matcher is regex and would otherwise also match the composer hint
# "Ask about your farm…".
- tapOn:
    text: "^Ask$"
- waitForAnimationToEnd

# Same pattern for the follow-up answer.
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"
