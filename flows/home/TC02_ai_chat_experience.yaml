appId: ${APP_ID}
name: "TC02 - AI Chat Experience"
# priority: P0
# description: Validates that users can ask farming-related questions and receive AI-generated responses along with suggested follow-up questions
tags:
  - home
  - chat
  - regression
---
- launchApp
- runFlow: ../../helpers/complete_onboarding.yaml

# Open the type input bar. waitForAnimationToEnd guards against the
# chat_text_input being declared visible while still animating in.
- tapOn:
    id: "primary_input_type_btn"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "chat_text_input"
    timeout: 3000
- tapOn:
    id: "chat_text_input"
- inputText: "What type of fertilizer should I use for tomatoes for better growth and yield?"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "chat_send_btn"
    timeout: 3000
# Capture send-tap time for the first-answer latency benchmark.
- evalScript: ${output.t_send_first = Date.now()}
- tapOn:
    id: "chat_send_btn"

# scrollUntilVisible waits up to 90s for chat_suggested_questions, which
# only appears once the answer is fully streamed — that's the implicit
# "wait for AI response".
- scrollUntilVisible:
    centerElement: false
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 75
# Latency line is emitted via console.log → Maestro's internal maestro.log
# (NOT the CLI stdout). build_latency_chips() in run_tests.sh picks this
# up and renders a chip in the HTML report.
- evalScript: ${console.log('[TC02-LATENCY] first_answer_ms=' + (Date.now() - output.t_send_first))}
- assertVisible:
    id: "chat_suggested_questions"

# Tap the first suggested question by its stable per-row id. The previous
# `text: "^Ask$"` selector relied on Maestro's regex substring behavior
# matching the "Ask" icon's a11y label — fragile if frontend ever changes
# the icon label.
- evalScript: ${output.t_send_followup = Date.now()}
- tapOn:
    id: "chat_suggested_question_0"
- waitForAnimationToEnd

# Same pattern for the follow-up answer.
- scrollUntilVisible:
    centerElement: false
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 75
- evalScript: ${console.log('[TC02-LATENCY] followup_answer_ms=' + (Date.now() - output.t_send_followup))}
- assertVisible:
    id: "chat_suggested_questions"