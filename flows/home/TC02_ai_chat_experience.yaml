appId: any
name: "TC02 - AI Chat Experience"
tags:
  - home
  - chat
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Open the type input bar
- tapOn:
    id: "primary_input_type_btn"
- extendedWaitUntil:
    visible:
      id: "chat_text_input"
    timeout: 5000
- tapOn:
    id: "chat_text_input"
- inputText: "How to grow tomatoes"
- extendedWaitUntil:
    visible:
      id: "chat_send_btn"
    timeout: 5000
- tapOn:
    id: "chat_send_btn"

# Wait for the chat screen and scroll to the suggested questions block
- extendedWaitUntil:
    visible:
      id: "chat_screen"
    timeout: 30000
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"

# Tap an "Ask" follow-up suggestion (exact match avoids the placeholder "Ask about your farm…")
- tapOn:
    text: "^Ask$"

# Wait for the follow-up answer and verify suggestions reappear
- extendedWaitUntil:
    visible:
      id: "chat_screen"
    timeout: 30000
- waitForAnimationToEnd
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"
