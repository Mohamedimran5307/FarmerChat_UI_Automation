appId: any
name: "TC02 - AI Chat Experience"
tags:
  - home
  - chat
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Tap on Type button
- tapOn:
    id: "home_type_button"
- tapOn: "Ask about your farm..."
- inputText: "How to grow tomatoes in Kenya"
- extendedWaitUntil:
    visible:
      id: "text_input_send_button"
    timeout: 5000
- tapOn:
    id: "text_input_send_button"

# Wait for AI response
- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- waitForAnimationToEnd

# Scroll down to find "Related questions" section
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible: "Related questions"

# Tap Ask button (exact match to avoid "Ask about your farm...")
- tapOn:
    text: "^Ask$"

# Wait for new response after tapping related question
- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- waitForAnimationToEnd

# Verify Related questions appear again after follow-up
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible: "Related questions"
