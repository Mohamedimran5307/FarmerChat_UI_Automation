appId: any
name: "TC05 - User Authentication & Logout"
# priority: P0
# description: Verifies complete user flow including sign-up, login, and logout functionality
tags:
  - settings
  - auth
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# ── Sign up with phone number ──
- tapOn:
    id: "home_hamburger_button"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "drawer_signup_btn"
    timeout: 5000
- tapOn:
    id: "drawer_signup_btn"

# Some builds insert an intermediate "Sign up with phone number" step
- runFlow:
    when:
      visible:
        text: "Sign up with phone number"
    commands:
      - tapOn: "Sign up with phone number"

- extendedWaitUntil:
    visible:
      id: "auth_phone_input"
    timeout: 10000
- tapOn:
    id: "auth_phone_input"
- inputText: "${PHONE_NUMBER}"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "auth_send_sms_btn"
    timeout: 5000
- tapOn:
    id: "auth_send_sms_btn"

- extendedWaitUntil:
    visible:
      id: "auth_otp_input"
    timeout: 30000
- tapOn:
    id: "auth_otp_input"
- inputText: "${OTP_CODE}"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "auth_verify_btn"
    timeout: 5000
- tapOn:
    id: "auth_verify_btn"

- extendedWaitUntil:
    visible:
      id: "account_success_screen"
    timeout: 30000
- tapOn:
    id: "account_success_btn_continue"

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 15000

# ── Open drawer → Settings ──
- tapOn:
    id: "home_hamburger_button"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "drawer_settings_btn"
    timeout: 5000
- tapOn:
    id: "drawer_settings_btn"
- extendedWaitUntil:
    visible:
      id: "settings_screen"
    timeout: 5000

# ── Tap Logout in Settings (same tag as Sign up; text flips with auth state) ──
- tapOn:
    id: "settings_btn_auth"

# ── Assert navigated back to language screen ──
- extendedWaitUntil:
    visible:
      id: "language_screen"
    timeout: 15000
