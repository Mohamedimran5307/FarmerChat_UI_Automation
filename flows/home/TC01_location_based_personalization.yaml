appId: any
name: "TC01 - Location-Based Personalization"
tags:
  - home
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

- runFlow: ../../helpers/grant_location.yaml

# After granting location, the weather/location card opens a chat — scroll to its related-questions block
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_suggested_questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible:
    id: "chat_suggested_questions"

# Back to home and confirm a personalized feed card is rendered
- back
- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 10000
- assertVisible:
    id: "content_card_start_chat_btn"
